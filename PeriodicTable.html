<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element Explorer!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #87CEEB; /* Sky blue background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        .game-board {
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            text-align: center;
            width: 90%;
            max-width: 450px;
        }

        h1 {
            margin-top: 0;
            color: #FF6B6B;
            font-size: 32px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .element-square {
            width: 160px;
            height: 160px;
            background-color: #FFE66D; /* Fun yellow */
            border: 6px solid #FFD166;
            border-radius: 20px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 64px;
            font-weight: bold;
            color: #2B2D42;
            box-shadow: inset 0 -5px 0 rgba(0,0,0,0.05);
            transition: transform 0.1s ease-in-out;
        }

        /* Fun animation class for shuffling */
        .shaking {
            transform: scale(1.05) rotate(3deg);
        }

        .controls button {
            font-size: 20px;
            padding: 12px 25px;
            margin: 0 10px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
            transition: all 0.1s;
        }

        .controls button:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 rgba(0,0,0,0.2);
        }

        #go-btn {
            background-color: #4ECDC4; /* Mint green */
        }

        #go-btn:hover { background-color: #45b7af; }
        #go-btn:disabled { background-color: #a0a0a0; cursor: not-allowed; box-shadow: none; transform: none; }

        #ans-btn {
            background-color: #FF6B6B; /* Coral red */
        }

        #ans-btn:hover { background-color: #e55f5f; }
        #ans-btn:disabled { background-color: #a0a0a0; cursor: not-allowed; box-shadow: none; transform: none; }

        #answer-section {
            min-height: 100px;
            margin-top: 30px;
            background-color: #F8F9FA;
            border-radius: 15px;
            padding: 15px;
            opacity: 0; /* Hidden by default */
            transition: opacity 0.3s ease-in-out;
        }

        #answer-section.visible {
            opacity: 1; /* Shows when answer button is clicked */
        }

        .element-name {
            font-size: 30px;
            color: #2B2D42;
            margin: 0 0 10px 0;
            font-weight: bold;
        }

        .element-details {
            font-size: 20px;
            color: #6c757d;
            margin: 5px 0;
            background: #E9ECEF;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="game-board">
        <h1>Element Explorer!</h1>
        
        <div id="element-display" class="element-square">?</div>
        
        <div class="controls">
            <button id="go-btn" onclick="startShuffle()">Go!</button>
            <button id="ans-btn" onclick="showAnswer()" disabled>Answer!</button>
        </div>

        <div id="answer-section">
            <p id="el-name" class="element-name"></p>
            <p class="element-details">🧬 Protons: <span id="el-protons"></span></p>
            <br>
            <p class="element-details">🔗 Free Bonds: <span id="el-bonds"></span></p>
        </div>
    </div>

    <script>
        // The complete periodic table (118 elements)
        const elementsData = [
            { symbol: 'H', name: 'Hydrogen', protons: 1, bonds: '1' },
            { symbol: 'He', name: 'Helium', protons: 2, bonds: '0' },
            { symbol: 'Li', name: 'Lithium', protons: 3, bonds: '1' },
            { symbol: 'Be', name: 'Beryllium', protons: 4, bonds: '2' },

            { symbol: 'Na', name: 'Sodium', protons: 11, bonds: '1' },
            { symbol: 'Mg', name: 'Magnesium', protons: 12, bonds: '2' },
            { symbol: 'Al', name: 'Aluminum', protons: 13, bonds: '3' },
            { symbol: 'Si', name: 'Silicon', protons: 14, bonds: '4' },
            { symbol: 'P', name: 'Phosphorus', protons: 15, bonds: '3 or 5' },
            { symbol: 'S', name: 'Sulfur', protons: 16, bonds: '2, 4, or 6' },
            { symbol: 'Cl', name: 'Chlorine', protons: 17, bonds: '1' },
            { symbol: 'Ar', name: 'Argon', protons: 18, bonds: '0' },
            { symbol: 'K', name: 'Potassium', protons: 19, bonds: '1' },
            { symbol: 'Ca', name: 'Calcium', protons: 20, bonds: '2' },
            { symbol: 'Sc', name: 'Scandium', protons: 21, bonds: '3' },
            { symbol: 'Ti', name: 'Titanium', protons: 22, bonds: '4' },
            { symbol: 'V', name: 'Vanadium', protons: 23, bonds: '5 or 4' },
            { symbol: 'Cr', name: 'Chromium', protons: 24, bonds: '3 or 6' },
            { symbol: 'Mn', name: 'Manganese', protons: 25, bonds: '2, 4, or 7' },
            { symbol: 'Fe', name: 'Iron', protons: 26, bonds: '2 or 3' },
            { symbol: 'Co', name: 'Cobalt', protons: 27, bonds: '2 or 3' },
            { symbol: 'Ni', name: 'Nickel', protons: 28, bonds: '2' },
            { symbol: 'Cu', name: 'Copper', protons: 29, bonds: '1 or 2' },
            { symbol: 'Zn', name: 'Zinc', protons: 30, bonds: '2' },
            { symbol: 'Ga', name: 'Gallium', protons: 31, bonds: '3' },
            { symbol: 'Ge', name: 'Germanium', protons: 32, bonds: '4' },
            { symbol: 'As', name: 'Arsenic', protons: 33, bonds: '3 or 5' },
            { symbol: 'Se', name: 'Selenium', protons: 34, bonds: '2, 4, or 6' },
            { symbol: 'Br', name: 'Bromine', protons: 35, bonds: '1' },
            { symbol: 'Kr', name: 'Krypton', protons: 36, bonds: '0' },
            { symbol: 'Rb', name: 'Rubidium', protons: 37, bonds: '1' },
            { symbol: 'Sr', name: 'Strontium', protons: 38, bonds: '2' },
            { symbol: 'Y', name: 'Yttrium', protons: 39, bonds: '3' },
            { symbol: 'Zr', name: 'Zirconium', protons: 40, bonds: '4' },

            { symbol: 'Ru', name: 'Ruthenium', protons: 44, bonds: '3 or 4' },
            { symbol: 'Rh', name: 'Rhodium', protons: 45, bonds: '3' },
            { symbol: 'Pd', name: 'Palladium', protons: 46, bonds: '2 or 4' },
            { symbol: 'Ag', name: 'Silver', protons: 47, bonds: '1' },
            { symbol: 'Cd', name: 'Cadmium', protons: 48, bonds: '2' },
            { symbol: 'In', name: 'Indium', protons: 49, bonds: '3' },
            { symbol: 'Sn', name: 'Tin', protons: 50, bonds: '2 or 4' },
            { symbol: 'Sb', name: 'Antimony', protons: 51, bonds: '3 or 5' },
            { symbol: 'Te', name: 'Tellurium', protons: 52, bonds: '2 or 4' },
            { symbol: 'I', name: 'Iodine', protons: 53, bonds: '1' },
            { symbol: 'Xe', name: 'Xenon', protons: 54, bonds: '0' },
            { symbol: 'Cs', name: 'Cesium', protons: 55, bonds: '1' },
            { symbol: 'Ba', name: 'Barium', protons: 56, bonds: '2' },
            { symbol: 'La', name: 'Lanthanum', protons: 57, bonds: '3' },
            { symbol: 'Ce', name: 'Cerium', protons: 58, bonds: '3 or 4' },
            { symbol: 'Pr', name: 'Praseodymium', protons: 59, bonds: '3' },

            { symbol: 'Dy', name: 'Dysprosium', protons: 66, bonds: '3' },
            { symbol: 'Ho', name: 'Holmium', protons: 67, bonds: '3' },
            { symbol: 'Er', name: 'Erbium', protons: 68, bonds: '3' },

            { symbol: 'Hf', name: 'Hafnium', protons: 72, bonds: '4' },

            { symbol: 'W', name: 'Tungsten', protons: 74, bonds: '6' },
            { symbol: 'Re', name: 'Rhenium', protons: 75, bonds: '4 or 7' },
            { symbol: 'Os', name: 'Osmium', protons: 76, bonds: '4 or 8' },
            { symbol: 'Ir', name: 'Iridium', protons: 77, bonds: '3 or 4' },
            { symbol: 'Pt', name: 'Platinum', protons: 78, bonds: '2 or 4' },
            { symbol: 'Au', name: 'Gold', protons: 79, bonds: '1 or 3' },
            { symbol: 'Hg', name: 'Mercury', protons: 80, bonds: '2' },

            { symbol: 'At', name: 'Astatine', protons: 85, bonds: '1' },
            { symbol: 'Rn', name: 'Radon', protons: 86, bonds: '0' },
            { symbol: 'Fr', name: 'Francium', protons: 87, bonds: '1' },
            { symbol: 'Ra', name: 'Radium', protons: 88, bonds: '2' },
            { symbol: 'Ac', name: 'Actinium', protons: 89, bonds: '3' },
            { symbol: 'Th', name: 'Thorium', protons: 90, bonds: '4' },
            { symbol: 'Pa', name: 'Protactinium', protons: 91, bonds: '5' },
            { symbol: 'U', name: 'Uranium', protons: 92, bonds: '4 or 6' },
            { symbol: 'Np', name: 'Neptunium', protons: 93, bonds: '5' },
            { symbol: 'Pu', name: 'Plutonium', protons: 94, bonds: '4' },
            { symbol: 'Am', name: 'Americium', protons: 95, bonds: '3' },
            { symbol: 'Cm', name: 'Curium', protons: 96, bonds: '3' },
            { symbol: 'Bk', name: 'Berkelium', protons: 97, bonds: '3' },
            { symbol: 'Cf', name: 'Californium', protons: 98, bonds: '3' },
            { symbol: 'Es', name: 'Einsteinium', protons: 99, bonds: '3' },
            { symbol: 'Fm', name: 'Fermium', protons: 100, bonds: '3' },
            { symbol: 'Md', name: 'Mendelevium', protons: 101, bonds: '3' },
            { symbol: 'No', name: 'Nobelium', protons: 102, bonds: '2' },
            { symbol: 'Lr', name: 'Lawrencium', protons: 103, bonds: '3' },
            { symbol: 'Rf', name: 'Rutherfordium', protons: 104, bonds: '4' },
            { symbol: 'Db', name: 'Dubnium', protons: 105, bonds: '5' },
            { symbol: 'Sg', name: 'Seaborgium', protons: 106, bonds: '6' },
            { symbol: 'Bh', name: 'Bohrium', protons: 107, bonds: '7' },
            { symbol: 'Hs', name: 'Hassium', protons: 108, bonds: '8' },
            { symbol: 'Mt', name: 'Meitnerium', protons: 109, bonds: 'Unknown' },
            { symbol: 'Ds', name: 'Darmstadtium', protons: 110, bonds: 'Unknown' },
            { symbol: 'Rg', name: 'Roentgenium', protons: 111, bonds: 'Unknown' },
            { symbol: 'Cn', name: 'Copernicium', protons: 112, bonds: '2 (predicted)' },
            { symbol: 'Nh', name: 'Nihonium', protons: 113, bonds: 'Unknown' },
            { symbol: 'Fl', name: 'Flerovium', protons: 114, bonds: 'Unknown' },
            { symbol: 'Mc', name: 'Moscovium', protons: 115, bonds: 'Unknown' },
            { symbol: 'Lv', name: 'Livermorium', protons: 116, bonds: 'Unknown' },
            { symbol: 'Ts', name: 'Tennessine', protons: 117, bonds: 'Unknown' },
            { symbol: 'Og', name: 'Oganesson', protons: 118, bonds: 'Unknown' }
        ];

        let currentElement = null;
        let shuffleInterval;

        // Get HTML elements
        const display = document.getElementById('element-display');
        const answerSection = document.getElementById('answer-section');
        const nameDisplay = document.getElementById('el-name');
        const protonsDisplay = document.getElementById('el-protons');
        const bondsDisplay = document.getElementById('el-bonds');
        const goBtn = document.getElementById('go-btn');
        const ansBtn = document.getElementById('ans-btn');

        function startShuffle() {
            // Hide the answer and disable the answer button while shuffling
            answerSection.classList.remove('visible');
            ansBtn.disabled = true;
            goBtn.disabled = true;
            display.classList.add('shaking');

            let shuffleCount = 0;
            const maxShuffles = 15; // How many times it flashes different symbols before stopping

            // Rapidly change the symbol to create a "spinning wheel" effect
            shuffleInterval = setInterval(() => {
                const randomEl = elementsData[Math.floor(Math.random() * elementsData.length)];
                
                // Ensure 3-letter temporary symbols fit in the box nicely
                if(randomEl.symbol.length > 2) {
                    display.style.fontSize = '48px';
                } else {
                    display.style.fontSize = '64px';
                }
                
                display.innerText = randomEl.symbol;
                shuffleCount++;

                if (shuffleCount >= maxShuffles) {
                    stopShuffle();
                }
            }, 80); // Changes every 80 milliseconds
        }

        function stopShuffle() {
            clearInterval(shuffleInterval);
            
            // Pick the final random element
            currentElement = elementsData[Math.floor(Math.random() * elementsData.length)];
            
            if(currentElement.symbol.length > 2) {
                display.style.fontSize = '48px';
            } else {
                display.style.fontSize = '64px';
            }
            
            display.innerText = currentElement.symbol;
            
            // Re-enable buttons and stop the shaking animation
            display.classList.remove('shaking');
            goBtn.disabled = false;
            ansBtn.disabled = false;
        }

        function showAnswer() {
            if (currentElement) {
                // Fill in the data
                nameDisplay.innerText = currentElement.name;
                protonsDisplay.innerText = currentElement.protons;
                bondsDisplay.innerText = currentElement.bonds;
                
                // Show the answer box
                answerSection.classList.add('visible');
                
                // Disable answer button until "Go" is pressed again
                ansBtn.disabled = true;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element Explorer!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #87CEEB; /* Sky blue background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        .game-board {
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            text-align: center;
            width: 90%;
            max-width: 450px;
        }

        h1 {
            margin-top: 0;
            color: #FF6B6B;
            font-size: 32px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .element-square {
            width: 160px;
            height: 160px;
            background-color: #FFE66D; /* Fun yellow */
            border: 6px solid #FFD166;
            border-radius: 20px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 64px;
            font-weight: bold;
            color: #2B2D42;
            box-shadow: inset 0 -5px 0 rgba(0,0,0,0.05);
            transition: transform 0.1s ease-in-out;
        }

        /* Fun animation class for shuffling */
        .shaking {
            transform: scale(1.05) rotate(3deg);
        }

        .controls button {
            font-size: 20px;
            padding: 12px 25px;
            margin: 0 10px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
            transition: all 0.1s;
        }

        .controls button:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 rgba(0,0,0,0.2);
        }

        #go-btn {
            background-color: #4ECDC4; /* Mint green */
        }

        #go-btn:hover { background-color: #45b7af; }
        #go-btn:disabled { background-color: #a0a0a0; cursor: not-allowed; box-shadow: none; transform: none; }

        #ans-btn {
            background-color: #FF6B6B; /* Coral red */
        }

        #ans-btn:hover { background-color: #e55f5f; }
        #ans-btn:disabled { background-color: #a0a0a0; cursor: not-allowed; box-shadow: none; transform: none; }

        #answer-section {
            min-height: 80px;
            margin-top: 30px;
            background-color: #F8F9FA;
            border-radius: 15px;
            padding: 15px;
            opacity: 0; /* Hidden by default */
            transition: opacity 0.3s ease-in-out;
        }

        #answer-section.visible {
            opacity: 1; /* Shows when answer button is clicked */
        }

        .element-name {
            font-size: 30px;
            color: #2B2D42;
            margin: 0 0 10px 0;
            font-weight: bold;
        }

        .element-details {
            font-size: 20px;
            color: #6c757d;
            margin: 5px 0;
            background: #E9ECEF;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="game-board">
        <h1>Element Explorer!</h1>
        
        <div id="element-display" class="element-square">?</div>
        
        <div class="controls">
            <button id="go-btn" onclick="startShuffle()">Go!</button>
            <button id="ans-btn" onclick="showAnswer()" disabled>Answer!</button>
        </div>

        <div id="answer-section">
            <p id="el-name" class="element-name"></p>
            <p class="element-details">🧬 Protons: <span id="el-protons"></span></p>
        </div>
    </div>

    <script>
        // Curated list of common, naturally occurring, and useful elements
        const elementsData = [
            { symbol: 'H', name: 'Hydrogen', protons: 1 },
            { symbol: 'He', name: 'Helium', protons: 2 },
            { symbol: 'Li', name: 'Lithium', protons: 3 },
            { symbol: 'Be', name: 'Beryllium', protons: 4 },
            { symbol: 'B', name: 'Boron', protons: 5 },
            { symbol: 'C', name: 'Carbon', protons: 6 },
            { symbol: 'N', name: 'Nitrogen', protons: 7 },
            { symbol: 'O', name: 'Oxygen', protons: 8 },
            { symbol: 'F', name: 'Fluorine', protons: 9 },
            { symbol: 'Ne', name: 'Neon', protons: 10 },
            { symbol: 'Na', name: 'Sodium', protons: 11 },
            { symbol: 'Mg', name: 'Magnesium', protons: 12 },
            { symbol: 'Al', name: 'Aluminum', protons: 13 },
            { symbol: 'Si', name: 'Silicon', protons: 14 },
            { symbol: 'P', name: 'Phosphorus', protons: 15 },
            { symbol: 'S', name: 'Sulfur', protons: 16 },
            { symbol: 'Cl', name: 'Chlorine', protons: 17 },
            { symbol: 'Ar', name: 'Argon', protons: 18 },
            { symbol: 'K', name: 'Potassium', protons: 19 },
            { symbol: 'Ca', name: 'Calcium', protons: 20 },
            { symbol: 'Ti', name: 'Titanium', protons: 22 },
            { symbol: 'Cr', name: 'Chromium', protons: 24 },
            { symbol: 'Mn', name: 'Manganese', protons: 25 },
            { symbol: 'Fe', name: 'Iron', protons: 26 },
            { symbol: 'Co', name: 'Cobalt', protons: 27 },
            { symbol: 'Ni', name: 'Nickel', protons: 28 },
            { symbol: 'Cu', name: 'Copper', protons: 29 },
            { symbol: 'Zn', name: 'Zinc', protons: 30 },
            { symbol: 'As', name: 'Arsenic', protons: 33 },
            { symbol: 'Br', name: 'Bromine', protons: 35 },
            { symbol: 'Kr', name: 'Krypton', protons: 36 },
            { symbol: 'Ag', name: 'Silver', protons: 47 },
            { symbol: 'Sn', name: 'Tin', protons: 50 },
            { symbol: 'I', name: 'Iodine', protons: 53 },
            { symbol: 'Xe', name: 'Xenon', protons: 54 },
            { symbol: 'Ba', name: 'Barium', protons: 56 },
            { symbol: 'W', name: 'Tungsten', protons: 74 },
            { symbol: 'Pt', name: 'Platinum', protons: 78 },
            { symbol: 'Au', name: 'Gold', protons: 79 },
            { symbol: 'Hg', name: 'Mercury', protons: 80 },
            { symbol: 'Pb', name: 'Lead', protons: 82 },
            { symbol: 'U', name: 'Uranium', protons: 92 }
        ];

        let currentElement = null;
        let shuffleInterval;

        // Get HTML elements
        const display = document.getElementById('element-display');
        const answerSection = document.getElementById('answer-section');
        const nameDisplay = document.getElementById('el-name');
        const protonsDisplay = document.getElementById('el-protons');
        const goBtn = document.getElementById('go-btn');
        const ansBtn = document.getElementById('ans-btn');

        function startShuffle() {
            // Hide the answer and disable the answer button while shuffling
            answerSection.classList.remove('visible');
            ansBtn.disabled = true;
            goBtn.disabled = true;
            display.classList.add('shaking');

            let shuffleCount = 0;
            const maxShuffles = 15; // How many times it flashes different symbols before stopping

            // Rapidly change the symbol to create a "spinning wheel" effect
            shuffleInterval = setInterval(() => {
                const randomEl = elementsData[Math.floor(Math.random() * elementsData.length)];
                
                display.innerText = randomEl.symbol;
                shuffleCount++;

                if (shuffleCount >= maxShuffles) {
                    stopShuffle();
                }
            }, 80); // Changes every 80 milliseconds
        }

        function stopShuffle() {
            clearInterval(shuffleInterval);
            
            // Pick the final random element
            currentElement = elementsData[Math.floor(Math.random() * elementsData.length)];
            display.innerText = currentElement.symbol;
            
            // Re-enable buttons and stop the shaking animation
            display.classList.remove('shaking');
            goBtn.disabled = false;
            ansBtn.disabled = false;
        }

        function showAnswer() {
            if (currentElement) {
                // Fill in the data
                nameDisplay.innerText = currentElement.name;
                protonsDisplay.innerText = currentElement.protons;
                
                // Show the answer box
                answerSection.classList.add('visible');
                
                // Disable answer button until "Go" is pressed again
                ansBtn.disabled = true;
            }
        }
    </script>
</body>
</html>

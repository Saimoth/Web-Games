          s=s.replace(old,new)

          s=s.replace('let lastChallengeName = "";','''let lastChallengeName = "";
let challengeCheckTimer = 0;
let challengeSolved = false;''')

          s=s.replace('function updateReadout() {','''function updateReadout() {
  if (challengeActive) scheduleChallengeCheck();''')

          start=s.index('function pickChallenge() {')
          end=s.index('/* ---------- Structure library ---------- */')
          replacement=r'''function pickChallenge() {
  const pool=challengePool();
  let options=pool.filter(t=>t.name!==lastChallengeName);
  if(!options.length) options=pool;
  challengeTemplate=options[Math.floor(Math.random()*options.length)];
  lastChallengeName=challengeTemplate.name;
  challengeSolved=false;
  clearTimeout(challengeCheckTimer);
  document.getElementById("correctFlash").classList.remove("show");
  clearAll();
  document.getElementById("challengeResult").textContent="";
  updateChallengePrompt();
}
function updateChallengePrompt() {
  if(!challengeTemplate)return;
  challengeDifficulty=document.getElementById("difficulty").value;
  document.getElementById("challengePrompt").textContent=`Build: ${challengeTemplate.name}`;
  document.getElementById("challengeFormula").textContent=challengeDifficulty==="hard"?"":prettyFormula(challengeFormulaOfTemplate(challengeTemplate));
}
function scheduleChallengeCheck() {
  if(!challengeActive || !challengeTemplate || challengeSolved) return;
  clearTimeout(challengeCheckTimer);
  challengeCheckTimer=setTimeout(checkChallengeAutomatically,180);
}
function checkChallengeAutomatically() {
  if(!challengeActive || !challengeTemplate || challengeSolved || !atoms.length) return;
  const comps=components();
  if(comps.length!==1) return;
  if(!graphIsomorphic(graphForComponent(comps[0]),challengeTemplate)) return;
  challengeSolved=true;
  document.getElementById("challengeResult").textContent="";
  document.getElementById("correctFlash").classList.add("show");
  navigator.vibrate?.([35,45,55]);
  setTimeout(()=>{ if(challengeActive && challengeSolved) pickChallenge(); },1900);
}
const challengePanel=document.getElementById("challengePanel");
const challengeActions=document.getElementById("challengeActions");
document.getElementById("gameBtn").addEventListener("click",()=>{challengeActive=true;challengePanel.classList.add("open");challengeActions.classList.add("open");if(!challengeTemplate)pickChallenge();});
document.getElementById("closeChallenge").addEventListener("click",()=>{challengeActive=false;challengeSolved=false;clearTimeout(challengeCheckTimer);document.getElementById("correctFlash").classList.remove("show");challengePanel.classList.remove("open");challengeActions.classList.remove("open");updateReadout();});
document.getElementById("difficulty").addEventListener("change",()=>{updateChallengePrompt();scheduleChallengeCheck();});
document.getElementById("nextChallenge").addEventListener("click",pickChallenge);


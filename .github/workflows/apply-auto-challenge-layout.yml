          s=s[:start]+replacement+s[end:]

          draw_start=s.index('function drawSkeletalPanel() {')
          draw_end=s.index('function drawChallengeTarget() {')
          new_draw=r'''function skeletalDisplayGraph(types, edges) {
  const neighbours=Array.from({length:types.length},()=>[]);
  for(const e of edges){neighbours[e.a].push(e.b);neighbours[e.b].push(e.a);}
  const hidden=new Set();
  const hydroxyl=new Set();
  for(let i=0;i<types.length;i++){
    if(types[i]!=="H")continue;
    const ns=neighbours[i];
    if(ns.length!==1)continue;
    const n=ns[0];
    if(types[n]==="C")hidden.add(i);
    if(types[n]==="O"){
      const oxygenNeighbours=neighbours[n];
      if(oxygenNeighbours.some(k=>types[k]==="C")){hidden.add(i);hydroxyl.add(n);}
    }
  }
  const nodes=types.map((_,i)=>i).filter(i=>!hidden.has(i));
  const nodeSet=new Set(nodes);
  const visibleEdges=edges.filter(e=>nodeSet.has(e.a)&&nodeSet.has(e.b));
  return {nodes,edges:visibleEdges,hydroxyl};
}

function naturalSkeletalLayout(types, edges, nodes) {
  const pos=new Map();
  if(!nodes.length)return pos;
  if(nodes.length===1){pos.set(nodes[0],{x:0,y:0});return pos;}
  const set=new Set(nodes),adj=new Map(nodes.map(i=>[i,[]]));
  for(const e of edges)if(set.has(e.a)&&set.has(e.b)){adj.get(e.a).push(e.b);adj.get(e.b).push(e.a);}
  const simpleRing=edges.length===nodes.length&&nodes.every(i=>adj.get(i).length===2);
  if(simpleRing){
    const order=[nodes[0]],seen=new Set(order);let prev=-1,cur=nodes[0];
    while(order.length<nodes.length){const next=adj.get(cur).find(n=>n!==prev&&!seen.has(n));if(next===undefined)break;order.push(next);seen.add(next);prev=cur;cur=next;}
    const radius=Math.max(1,order.length/(2*Math.PI));
    order.forEach((n,i)=>{const a=-Math.PI/2+i*Math.PI*2/order.length;pos.set(n,{x:Math.cos(a)*radius,y:Math.sin(a)*radius});});
    return pos;
  }
  function farthest(start){const q=[start],parent=new Map([[start,-1]]),dist=new Map([[start,0]]);let best=start;while(q.length){const n=q.shift();if(dist.get(n)>dist.get(best))best=n;for(const k of adj.get(n)){if(!dist.has(k)){dist.set(k,dist.get(n)+1);parent.set(k,n);q.push(k);}}}return {best,parent};}
  const a=farthest(nodes[0]).best,bfs=farthest(a),backbone=[];let n=bfs.best;
  while(n!==-1){backbone.push(n);n=bfs.parent.get(n);}
  backbone.reverse();
  const backboneSet=new Set(backbone);
  backbone.forEach((id,i)=>pos.set(id,{x:i,y:i%2?0.42:0}));
  const placed=new Set(backbone);
  function placeBranches(parent,from,sign){
    const children=adj.get(parent).filter(n=>n!==from&&!placed.has(n));
    children.forEach((child,k)=>{
      const p=pos.get(parent),base=(sign>0?-1.05:1.05)+(k-(children.length-1)/2)*0.55;
      pos.set(child,{x:p.x+Math.cos(base),y:p.y+Math.sin(base)});placed.add(child);placeBranches(child,parent,-sign);
    });
  }
  backbone.forEach((id,i)=>placeBranches(id,i?backbone[i-1]:-1,i%2?1:-1));
  for(const id of nodes)if(!pos.has(id))pos.set(id,{x:0,y:0});
  return pos;
}

function drawSkeletalGraph(types,edges,panelX,panelY,panelW,panelH,title){
  ctx.save();
  ctx.fillStyle="rgba(37,40,46,.94)";ctx.strokeStyle="#555c68";ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(panelX,panelY,panelW,panelH,13);ctx.fill();ctx.stroke();
  ctx.fillStyle="#9299a5";ctx.font="700 10px -apple-system,sans-serif";ctx.textAlign="left";ctx.textBaseline="middle";ctx.fillText(title,panelX+10,panelY+12);
  const g=skeletalDisplayGraph(types,edges),pos=naturalSkeletalLayout(types,g.edges,g.nodes);
  if(!g.nodes.length){ctx.restore();return;}
  let minX=Math.min(...g.nodes.map(i=>pos.get(i).x)),maxX=Math.max(...g.nodes.map(i=>pos.get(i).x));
  let minY=Math.min(...g.nodes.map(i=>pos.get(i).y)),maxY=Math.max(...g.nodes.map(i=>pos.get(i).y));
  if(maxX-minX<.2){minX-=.65;maxX+=.65;}if(maxY-minY<.2){minY-=.55;maxY+=.55;}
  const inner={x:panelX+13,y:panelY+27,w:panelW-26,h:panelH-39};
  const scale=Math.min(inner.w/(maxX-minX),inner.h/(maxY-minY));
  const P=i=>({x:inner.x+(inner.w-(maxX-minX)*scale)/2+(pos.get(i).x-minX)*scale,y:inner.y+(inner.h-(maxY-minY)*scale)/2+(pos.get(i).y-minY)*scale});
  for(const e of g.edges){const a=P(e.a),b=P(e.b);drawSkeletalBond(a.x,a.y,b.x,b.y,e.order);}
  for(const i of g.nodes){
    if(types[i]==="C")continue;
    const q=P(i),label=g.hydroxyl.has(i)?"OH":types[i];
    ctx.fillStyle=types[i]==="O"?"#ff666d":"#f2f3f5";ctx.font="800 15px -apple-system,sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(label,q.x,q.y);
  }
  ctx.restore();
}

function drawSkeletalPanel() {
  const panelW=Math.min(154,viewW*.40),panelH=122,x=viewW-panelW-9,y=9;
  if(challengeActive&&challengeDifficulty==="easy"&&challengeTemplate){drawSkeletalGraph(challengeTemplate.types,challengeTemplate.edges,x,y,panelW,panelH,"TARGET SKELETAL");return;}
  if(!atoms.length){
    ctx.save();ctx.fillStyle="rgba(37,40,46,.94)";ctx.strokeStyle="#555c68";ctx.beginPath();ctx.roundRect(x,y,panelW,panelH,13);ctx.fill();ctx.stroke();ctx.fillStyle="#9299a5";ctx.font="700 10px -apple-system,sans-serif";ctx.fillText("SKELETAL",x+10,y+12);ctx.fillStyle="#737a86";ctx.font="12px -apple-system,sans-serif";ctx.textAlign="center";ctx.fillText("Build a molecule",x+panelW/2,y+67);ctx.restore();return;
  }
  const comp=components()[0],index=new Map(comp.map((a,i)=>[a,i])),componentEdges=[];
  for(const b of bonds)if(index.has(b.a)&&index.has(b.b))componentEdges.push({a:index.get(b.a),b:index.get(b.b),order:b.order});
  drawSkeletalGraph(comp.map(a=>a.type),componentEdges,x,y,panelW,panelH,"SKELETAL");
}

function templateLayout(t){const g=skeletalDisplayGraph(t.types,t.edges);return naturalSkeletalLayout(t.types,g.edges,g.nodes);}
'''

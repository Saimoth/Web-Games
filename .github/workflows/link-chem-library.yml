name: Link ChemBuilder library
on:
  push:
    paths:
      - '.github/workflows/link-chem-library-trigger.txt'
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link library
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('ChemBuilder.html')
          s=p.read_text(encoding='utf-8')
          tag='<script src="ChemLibrary.js"></script>'
          if tag not in s:
              s=s.replace('</body>',tag+'\n</body>')
              p.write_text(s,encoding='utf-8')
          PY
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ChemBuilder.html
          git diff --cached --quiet || git commit -m "Link expanded chemistry library"
          git push

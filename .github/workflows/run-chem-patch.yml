name: Run ChemBuilder patch

on:
  push:
    paths:
      - '.chem-trigger'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract and run ChemBuilder patch
        run: |
          awk '/python - <<'"'"'PY'"'"'/{flag=1;next}/^          PY$/{flag=0}flag{sub(/^          /,"");print}' .github/workflows/apply-auto-challenge-layout.yml > /tmp/patch.py
          python /tmp/patch.py
      - name: Commit ChemBuilder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ChemBuilder.html
          git diff --cached --quiet || git commit -m "Auto-check challenges and clean skeletal layout"
          git push

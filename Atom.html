<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atomic Explorer: Infinite Rotation</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent: #00bcd4;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 10px;
            text-align: center;
        }

        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        p.hint { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 20px; }

        #table-wrapper {
            width: 100%;
            overflow-x: auto;
            padding-bottom: 20px;
        }

        #table-container {
            display: grid;
            grid-template-columns: repeat(18, 50px);
            grid-template-rows: repeat(10, 60px);
            gap: 4px;
            width: max-content;
            margin: 0 auto;
        }

        .element-card {
            background-color: var(--card-bg);
            border: 1px solid #333;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.1s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .element-card:active { transform: scale(0.90); border-color: var(--accent); }

        .el-num { position: absolute; top: 2px; left: 3px; font-size: 0.5rem; color: var(--text-muted); }
        .el-sym { font-size: 1.1rem; font-weight: bold; color: var(--accent); }
        .el-name { font-size: 0.45rem; text-transform: uppercase; margin-top: 2px; text-align: center; line-height: 1; }

        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(0, 0, 0, 0.98);
            z-index: 1000;
            flex-direction: column;
        }

        #modal-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background-color: #111; border-bottom: 1px solid #333;
        }

        #modal-title { font-size: 1.1rem; font-weight: bold; }
        #modal-subtitle { font-size: 0.8rem; color: var(--text-muted); font-weight: normal; margin-left: 10px;}

        #close-btn { background: none; border: none; color: white; font-size: 2rem; cursor: pointer; padding: 0; line-height: 1; }

        #canvas-container { flex-grow: 1; width: 100%; height: 100%; position: relative; touch-action: none; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--accent); display: none; }
        #zoom-hint { position: absolute; bottom: 30px; left: 0; width: 100%; text-align: center; color: rgba(255,255,255,0.5); font-size: 0.8rem; pointer-events: none;}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <h1>Atomic Structure Table</h1>
    <p class="hint">Swipe table left/right. Tap an element to view the atom.</p>
    
    <div id="table-wrapper">
        <div id="table-container"></div>
    </div>

    <div id="modal">
        <div id="modal-header">
            <div>
                <span id="modal-title">Element</span>
                <span id="modal-subtitle"></span>
            </div>
            <button id="close-btn">&times;</button>
        </div>
        <div id="canvas-container">
            <div id="loading">Building Atom...</div>
            <div id="zoom-hint">Swipe to spin freely. Pinch to zoom.</div>
        </div>
    </div>

,nm:'radon',p:86,ne:136,c:18,r:6},{n:87,s:'Fr',nm:'francium',p:87,ne:136,c:1,r:7},{n:88,s:'Ra',nm:'radium',p:88,ne:138,c:2,r:7},{n:89,s:'Ac',nm:'actinium',p:89,ne:138,c:4,r:10},{n:90,s:'Th',nm:'thorium',p:90,ne:142,c:5,r:10},{n:91,s:'Pa',nm:'protactinium',p:91,ne:140,c:6,r:10},{n:92,s:'U',nm:'uranium',p:92,ne:146,c:7,r:10},{n:93,s:'Np',nm:'neptunium',p:93,ne:144,c:8,r:10},{n:94,s:'Pu',nm:'plutonium',p:94,ne:150,c:9,r:10},{n:95,s:'Am',nm:'americium',p:95,ne:148,c:10,r:10},{n:96,s:'Cm',nm:'curium',p:96,ne:151,c:11,r:10},{n:97,s:'Bk',nm:'berkelium',p:97,ne:150,c:12,r:10},{n:98,s:'Cf',nm:'californium',p:98,ne:153,c:13,r:10},{n:99,s:'Es',nm:'einsteinium',p:99,ne:153,c:14,r:10},{n:100,s:'Fm',nm:'fermium',p:100,ne:157,c:15,r:10},{n:101,s:'Md',nm:'mendelevium',p:101,ne:157,c:16,r:10},{n:102,s:'No',nm:'nobelium',p:102,ne:157,c:17,r:10},{n:103,s:'Lr',nm:'lawrencium',p:103,ne:159,c:18,r:10},{n:104,s:'Rf',nm:'rutherfordium',p:104,ne:163,c:4,r:7},{n:105,s:'Db',nm:'dubnium',p:105,ne:163,c:5,r:7},{n:106,s:'Sg',nm:'seaborgium',p:106,ne:165,c:6,r:7},{n:107,s:'Bh',nm:'bohrium',p:107,ne:163,c:7,r:7},{n:108,s:'Hs',nm:'hassium',p:108,ne:161,c:8,r:7},{n:109,s:'Mt',nm:'meitnerium',p:109,ne:169,c:9,r:7},{n:110,s:'Ds',nm:'darmstadtium',p:110,ne:171,c:10,r:7},{n:111,s:'Rg',nm:'roentgenium',p:111,ne:171,c:11,r:7},{n:112,s:'Cn',nm:'copernicium',p:112,ne:173,c:12,r:7},{n:113,s:'Nh',nm:'nihonium',p:113,ne:173,c:13,r:7},{n:114,s:'Fl',nm:'flerovium',p:114,ne:175,c:14,r:7},{n:115,s:'Mc',nm:'moscovium',p:115,ne:175,c:15,r:7},{n:116,s:'Lv',nm:'livermorium',p:116,ne:177,c:16,r:7},{n:117,s:'Ts',nm:'tennessine',p:117,ne:177,c:17,r:7},{n:118,s:'Og',nm:'oganesson',p:118,ne:176,c:18,r:7}];

        const tableContainer = document.getElementById('table-container');
        const modal = document.getElementById('modal');
        const closeBtn = document.getElementById('close-btn');
        const modalTitle = document.getElementById('modal-title');
        const modalSubtitle = document.getElementById('modal-subtitle');
        const canvasContainer = document.getElementById('canvas-container');
        const loading = document.getElementById('loading');

        eData.forEach(el => {
            const card = document.createElement('div');
            card.className = 'element-card';
            card.style.gridColumn = el.c;
            card.style.gridRow = el.r;
            card.innerHTML = `<div class="el-num">${el.n}</div><div class="el-sym">${el.s}</div><div class="el-name">${el.nm}</div>`;
            card.onclick = () => open3DViewer(el);
            tableContainer.appendChild(card);
        });

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        let scene, camera, renderer, animationId, controls, clock;
        let atomGroup = null; 
        let particles = [];
        let minDist = 10, maxDist = 50;

        // Custom Rotation State
        let isDragging = false;
        let previousPointer = { x: 0, y: 0 };

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, canvasContainer.clientWidth / canvasContainer.clientHeight, 0.1, 1000);
            clock = new THREE.Clock();

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(canvasContainer.clientWidth, canvasContainer.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            canvasContainer.appendChild(renderer.domElement);

            // Keep OrbitControls for ZOOM only, disable its rotation
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.enablePan = false;
            controls.enableRotate = false; // We handle rotation manually now

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0xffffff, 1);
            pointLight.position.set(20, 20, 20);
            scene.add(pointLight);

            window.addEventListener('resize', onWindowResize, false);
            setupCustomRotation();
        }

        function setupCustomRotation() {
            const dom = renderer.domElement;

            // Mouse Events
            dom.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousPointer = { x: e.clientX, y: e.clientY };
            });
            dom.addEventListener('mousemove', (e) => {
                if (isDragging && atomGroup) {
                    let deltaX = e.clientX - previousPointer.x;
                    let deltaY = e.clientY - previousPointer.y;
                    
                    // Rotate based on fixed screen axes to prevent Gimbal Lock
                    atomGroup.rotateOnWorldAxis(new THREE.Vector3(0, 1, 0), deltaX * 0.005);
                    atomGroup.rotateOnWorldAxis(new THREE.Vector3(1, 0, 0), deltaY * 0.005);
                    
                    previousPointer = { x: e.clientX, y: e.clientY };
                }
            });
            dom.addEventListener('mouseup', () => isDragging = false);
            dom.addEventListener('mouseleave', () => isDragging = false);

            // Touch Events
            dom.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) { // Only rotate on 1-finger swipe
                    isDragging = true;
                    previousPointer = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                } else {
                    isDragging = false; // Allow pinch-zoom to take over
                }
            });
            dom.addEventListener('touchmove', (e) => {
                if (isDragging && e.touches.length === 1 && atomGroup) {
                    let deltaX = e.touches[0].clientX - previousPointer.x;
                    let deltaY = e.touches[0].clientY - previousPointer.y;
                    
                    atomGroup.rotateOnWorldAxis(new THREE.Vector3(0, 1, 0), deltaX * 0.008);
                    atomGroup.rotateOnWorldAxis(new THREE.Vector3(1, 0, 0), deltaY * 0.008);
                    
                    previousPointer = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                }
            });
            dom.addEventListener('touchend', () => isDragging = false);
        }

        function buildAtom(el) {
            cleanupAtom();
            if (!scene) init3D();
            
            atomGroup = new THREE.Group();
            scene.add(atomGroup);
            particles = [];

            const pMat = new THREE.MeshPhongMaterial({ color: 0xff3333, shininess: 80 }); 
            const nMat = new THREE.MeshPhongMaterial({ color: 0xffff33, shininess: 80 }); 
            const hashedOrbitMat = new THREE.LineDashedMaterial({ color: 0x00bcd4, dashSize: 1, gapSize: 1 });
            const electronBaseMat = new THREE.MeshPhongMaterial({ color: 0x3333ff, shininess: 100 }); 

            const nucleonGeo = new THREE.SphereGeometry(1, 16, 16);
            const electronGeo = new THREE.SphereGeometry(0.5, 16, 16);

            const totalNucleons = el.p + el.ne;
            const clusterRadius = Math.cbrt(totalNucleons) * 0.8;

            let nucleonsToCreate = [];
            for (let i = 0; i < el.p; i++) nucleonsToCreate.push({ type: 'p' });
            for (let i = 0; i < el.ne; i++) nucleonsToCreate.push({ type: 'n' });

            shuffle(nucleonsToCreate);

            for (let i = 0; i < totalNucleons; i++) {
                const nucleonData = nucleonsToCreate[i];
                const material = (nucleonData.type === 'p') ? pMat : nMat;
                const mesh = new THREE.Mesh(nucleonGeo, material);
                
                const phi = Math.acos(-1 + (2 * i) / totalNucleons);
                const theta = Math.sqrt(totalNucleons * Math.PI) * phi;
                
                const r = clusterRadius * (0.5 + Math.random() * 0.5); 
                if (totalNucleons === 1) mesh.position.set(0,0,0);
                else {
                    mesh.position.set(r * Math.cos(theta) * Math.sin(phi), r * Math.sin(theta) * Math.sin(phi), r * Math.cos(phi));
                }
                atomGroup.add(mesh);
            }

            const maxInShell = [2, 8, 18, 32, 32, 18, 8]; 
            let electronsPerShell = [];
            let remainingE = el.p;
            
            for (let max of maxInShell) {
                if (remainingE <= 0) break;
                let inThisShell = Math.min(remainingE, max);
                electronsPerShell.push(inThisShell);
                remainingE -= inThisShell;
            }

            let currentShellIndex = 0;
            let eInShellCounter = 0;
            let maxOrbitRadius = 0;

            for (let i = 0; i < el.p; i++) {
                if (eInShellCounter >= electronsPerShell[currentShellIndex]) {
                    currentShellIndex++;
                    eInShellCounter = 0;
                }

                let totalInThisShell = electronsPerShell[currentShellIndex];
                
                const baseOffset = clusterRadius + 3; 
                const orbitRadius = baseOffset + ((currentShellIndex + 1) * 4); 
                maxOrbitRadius = Math.max(maxOrbitRadius, orbitRadius);

                const orbitGeo = new THREE.BufferGeometry();
                const orbitPoints = [];
                for(let j=0; j<=128; j++) {
                    const angle = (j/128) * Math.PI * 2;
                    orbitPoints.push(new THREE.Vector3(Math.cos(angle)*orbitRadius, Math.sin(angle)*orbitRadius, 0));
                }
                orbitGeo.setFromPoints(orbitPoints);
                const hashedOrbitLine = new THREE.Line(orbitGeo, hashedOrbitMat);
                hashedOrbitLine.computeLineDistances(); 
                
                const angleStep = Math.PI / totalInThisShell;
                
                const rotX = Math.PI / 2;
                const rotY = angleStep * eInShellCounter; 
                const rotZ = currentShellIndex * (Math.PI / 6); 
                
                hashedOrbitLine.rotation.set(rotX, rotY, rotZ);
                atomGroup.add(hashedOrbitLine);

                const electron = new THREE.Mesh(electronGeo, electronBaseMat);
                atomGroup.add(electron);

                const trailMat = new THREE.ShaderMaterial({
                    uniforms: {
                        color: { value: new THREE.Color(0x3333ff) },
                        tailLength: { value: 0.1 } 
                    },
                    vertexShader: `
                        varying float vUvX;
                        void main() {
                            vUvX = uv.x;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: `
                        uniform vec3 color;
                        uniform float tailLength;
                        varying float vUvX;
                        void main() {
                            float alpha = smoothstep(1.0 - tailLength, 1.0, vUvX);
                            gl_FragColor = vec4(color, alpha * 0.8);
                        }
                    `,
                    transparent: true,
                    side: THREE.DoubleSide,
                    depthWrite: false 
                });

                const ribbonGeo = new THREE.PlaneGeometry(0.8, 1, 64, 1); 
                ribbonGeo.translate(0, 0.5, 0); 
                const trailMesh = new THREE.Mesh(ribbonGeo, trailMat);
                atomGroup.add(trailMesh);

                particles.push({
                    mesh: electron, radius: orbitRadius,
                    angle: Math.random() * Math.PI * 2,
                    rotX: rotX, rotY: rotY, rotZ: rotZ,
                    trail: trailMesh, trailMat: trailMat
                });

                eInShellCounter++;
            }

            const fov = THREE.MathUtils.degToRad(camera.fov / 2);
            minDist = (maxOrbitRadius + 2) / Math.tan(fov);
            maxDist = minDist * 4; 
            
            controls.minDistance = minDist;
            controls.maxDistance = maxDist;
            
            camera.position.set(0, 0, minDist);
            controls.update();

            clock.start();
            animate();
        }

        function animate() {
            animationId = requestAnimationFrame(animate);
            const delta = clock.getDelta();

            const currentDist = camera.position.length();
            let zoomRatio = (currentDist - minDist) / (maxDist - minDist || 1); 
            zoomRatio = Math.max(0, Math.min(1, zoomRatio)); 
            const speedMultiplier = 1 + (9 * zoomRatio);

            const orbitAmount = (Math.PI * 2) * speedMultiplier * delta;

            particles.forEach(p => {
                p.angle += orbitAmount * (15 / p.radius); 
                
                const vector = new THREE.Vector3(Math.cos(p.angle) * p.radius, Math.sin(p.angle) * p.radius, 0);
                const euler = new THREE.Euler(p.rotX, p.rotY, p.rotZ, 'XYZ');
                vector.applyEuler(euler);
                p.mesh.position.copy(vector);

                p.trailMat.uniforms.tailLength.value = 0.1 + (0.5 * zoomRatio); 
                
                const trailLengthRadians = p.trailMat.uniforms.tailLength.value * Math.PI;

                const points = [];
                const segments = 64;

                for (let j = 0; j <= segments; j++) {
                    const tailAngle = p.angle - (j / segments * trailLengthRadians);
                    
                    const headPos = new THREE.Vector3(Math.cos(tailAngle) * p.radius, Math.sin(tailAngle) * p.radius, 0.4);
                    const tailPos = new THREE.Vector3(Math.cos(tailAngle) * p.radius, Math.sin(tailAngle) * p.radius, -0.4);
                    
                    headPos.applyEuler(euler);
                    tailPos.applyEuler(euler);
                    
                    points.push(headPos, tailPos);
                }

                p.trail.geometry.setFromPoints(points);
            });

            // Gentle auto-rotation (using fixed screen axes to match swipe behavior)
            if(atomGroup && !isDragging) {
                atomGroup.rotateOnWorldAxis(new THREE.Vector3(0, 1, 0), 0.2 * delta);
                atomGroup.rotateOnWorldAxis(new THREE.Vector3(1, 0, 0), 0.1 * delta);
            }

            controls.update();
            renderer.render(scene, camera);
        }

        function cleanupAtom() {
            if (animationId) cancelAnimationFrame(animationId);
            if (atomGroup && scene) {
                scene.remove(atomGroup);
                atomGroup.children.forEach(child => {
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) child.material.dispose();
                });
                atomGroup = null;
            }
        }

        function onWindowResize() {
            if(!camera || !renderer) return;
            camera.aspect = canvasContainer.clientWidth / canvasContainer.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(canvasContainer.clientWidth, canvasContainer.clientHeight);
        }

        function open3DViewer(el) {
            modalTitle.innerText = `${el.s} - ${el.nm}`;
            modalSubtitle.innerText = `p: ${el.p} | n: ${el.ne} | e: ${el.p}`;
            modal.style.display = 'flex';
            loading.style.display = 'block';
            
            setTimeout(() => {
                buildAtom(el);
                loading.style.display = 'none';
            }, 50);
        }

        closeBtn.onclick = () => {
            modal.style.display = 'none';
            cleanupAtom();
        };
    </script>
</body>
</html>
